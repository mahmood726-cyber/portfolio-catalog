<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PortfolioCatalog Dashboard</title>
  <style>
    :root {
      --bg: #f7f2e7;
      --panel: rgba(255,255,255,0.84);
      --ink: #1d2a24;
      --muted: #5b675f;
      --line: rgba(29,42,36,0.12);
      --accent: #8f3d1f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Aptos", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(143, 61, 31, 0.14), transparent 32%),
        linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
    }
    .wrap {
      width: min(980px, calc(100% - 26px));
      margin: 0 auto;
      padding: 24px 0 40px;
    }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 18px 44px rgba(44,35,24,0.10);
      margin-bottom: 18px;
    }
    h1, h2 { margin: 0 0 12px; font-family: "Palatino Linotype", "Book Antiqua", serif; }
    .eyebrow {
      margin: 0 0 8px;
      font-size: 0.73rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .metric-grid, .gap-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: rgba(255,255,255,0.62);
    }
    .card strong {
      display: block;
      font-size: 1.6rem;
      margin-bottom: 6px;
    }
    .muted { color: var(--muted); line-height: 1.6; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 8px; text-align: left; border-bottom: 1px solid var(--line); }
    th { color: var(--muted); font-size: 0.82rem; text-transform: uppercase; letter-spacing: 0.08em; }
    @media (max-width: 820px) {
      .metric-grid, .gap-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .metric-grid, .gap-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <p class="eyebrow">E156 Dashboard</p>
      <h1>PortfolioCatalog</h1>
      <p class="muted">Compact summary of landing-page coverage, discoverability, and the remaining public metadata gaps across the indexed research portfolio.</p>
    </section>

    <section class="panel">
      <p class="eyebrow">Metrics</p>
      <h2>Overview</h2>
      <div class="metric-grid" id="metrics"></div>
    </section>

    <section class="panel">
      <p class="eyebrow">Gaps</p>
      <h2>Backlog</h2>
      <div class="gap-grid" id="gaps"></div>
    </section>

    <section class="panel">
      <p class="eyebrow">Tier Pattern</p>
      <h2>Discoverability By Tier</h2>
      <table>
        <thead>
          <tr>
            <th>Tier</th>
            <th>Projects</th>
            <th>Mean score</th>
            <th>Strong records</th>
          </tr>
        </thead>
        <tbody id="tiers"></tbody>
      </table>
    </section>
  </div>

  <script src="../../data.js"></script>
  <script>
    const data = window.PORTFOLIO_CATALOG_DATA;
    const metrics = [
      ["Projects", data.metrics.trackedProjects],
      ["Landing pages", data.metrics.landingPages],
      ["Mean discoverability", data.metrics.meanDiscoverability.toFixed(1)],
      ["High discoverability", `${data.metrics.highDiscoverabilityCount} (${data.metrics.highDiscoverabilityPercent.toFixed(1)}%)`],
    ];
    document.getElementById("metrics").innerHTML = metrics.map(([label, value]) => `
      <div class="card"><strong>${value}</strong><span>${label}</span></div>
    `).join("");
    document.getElementById("gaps").innerHTML = data.gapBreakdown.map((item) => `
      <div class="card"><strong>${item.count}</strong><span>${item.label}</span></div>
    `).join("");
    document.getElementById("tiers").innerHTML = data.tiers.map((item) => `
      <tr>
        <td>${item.tier}</td>
        <td>${item.count}</td>
        <td>${item.meanDiscoverability.toFixed(1)}</td>
        <td>${item.strongRecords}</td>
      </tr>
    `).join("");
  </script>
</body>
</html>
